repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-check
        args: [--fix, --config=config/ruff.toml]
      - id: ruff-format
        args: [--config=config/ruff.toml]

  - repo: local
    hooks:
      - id: mypy-pixi
        name: mypy (pixi dev env)
        entry: pixi run -e dev check-types
        language: system
        pass_filenames: false
